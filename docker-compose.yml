# Docker Compose file for the application
# Two Services : Backend api on port 5000 and Frontend on port 5173
version: "3.8"
services:
  backend:
    build: ./server
    container_name: backend
    restart: always
    env_file: ./server/.env
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://13.221.111.254:5000/api
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
